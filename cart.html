<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Shopping Cart</title>
</head>
<body>
    <header>
        <h1>Shopping Cart</h1>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example item, this should be generated dynamically -->
                <tr>
                    <td>Product Name</td>
                    <td>
                        <input type="number" value="1" min="1">
                    </td>
                    <td>$10.00</td>
                    <td>$10.00</td>
                    <td><button>Remove</button></td>
                </tr>
                <!-- Add more items as needed -->
            </tbody>
        </table>
        <div class="summary">
            <p>Subtotal: <span id="subtotal">$10.00</span></p>
            <p>Tax (5%): <span id="tax">$0.50</span></p>
            <p>Total: <span id="total">$10.50</span></p>
        </div>
    </main>
    <script>
        // JavaScript for updating subtotal, tax, and total
        const updateCart = () => {
            const quantities = document.querySelectorAll('input[type="number"]');
            const subtotal = Array.from(quantities).reduce((sum, input) => sum + (parseFloat(input.value) * 10.00), 0);
            const tax = subtotal * 0.05;
            const total = subtotal + tax;
            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').innerText = `$${tax.toFixed(2)}`;
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;
        }; 

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('change', updateCart);
        });
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function() {
                this.closest('tr').remove();
                updateCart();
            });
        });
    </script>
</body>
</html>

<!doctype html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Product Listing</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }\n        .product-card { border: 1px solid #ccc; border-radius: 5px; padding: 10px; text-align: center; }\n        .product-image { max-width: 100%; height: auto; }\n        .add-to-cart { background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }\n    </style>\n</head>\n<body>\n    <h1>Product Listing</h1>\n    <div class="product-grid">\n        <div class="product-card">\n            <img src="path/to/product1.jpg" alt="Product 1" class="product-image">\n            <h2>Product 1</h2>\n            <p>$19.99</p>\n            <button class="add-to-cart">Add to Cart</button>\n        </div>\n        <div class="product-card">\n            <img src="path/to/product2.jpg" alt="Product 2" class="product-image">\n            <h2>Product 2</h2>\n            <p>$29.99</p>\n            <button class="add-to-cart">Add to Cart</button>\n        </div>\n        <div class="product-card">\n            <img src="path/to/product3.jpg" alt="Product 3" class="product-image">\n            <h2>Product 3</h2>\n            <p>$39.99</p>\n            <button class="add-to-cart">Add to Cart</button>\n        </div>\n        <!-- Add more products as needed -->\n    </div>\n</body>\n</html>\n
